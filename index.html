<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJMAX OBS Overlay</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-color: rgba(30, 30, 32, 0.9);
            --card-bg: rgba(50, 50, 50, 0.95);
            --accent-blue: #60c5f1; /* More accurate to screenshot */
            --accent-yellow: #ffcc00;
            --text-main: #ffffff;
            --text-sub: #d0d0d0;
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: "Pretendard Variable", "Pretendard", -apple-system, sans-serif;
            color: var(--text-main);
            overflow: hidden;
            background: rgba(0,0,0,0.1); /* Slight darkness for preview */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #overlay-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 700px; /* Slimmer profile */
            padding: 0;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Profile Bar (The exact look from the screenshot) */
        .profile-bar {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            background: rgba(50, 50, 50, 0.85);
            border-radius: 8px; /* Sharper corners like screenshot */
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .profile-bar::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-blue);
        }

        .nick-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: 30px;
        }

        .nickname {
            font-size: 24px;
            font-weight: 800; /* Extra bold */
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .button-circle {
            width: 34px;
            height: 34px;
            border: 2px solid var(--accent-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-yellow);
            font-weight: 900;
            font-size: 13px;
        }

        .stat-labels {
            display: flex;
            gap: 20px;
            font-size: 16px;
            font-weight: 700;
        }

        .stat-item {
            color: var(--accent-blue);
            text-transform: uppercase;
        }

        .stat-item span {
            color: #fff;
            margin-left: 10px;
            font-weight: 600;
        }

        .refresh-timer {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-progress {
            width: 40px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .timer-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            transition: width 1s linear;
        }

        /* Rainbow Flash Effect */
        @keyframes rainbow-border {
            0% { border-color: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
            20% { border-color: #ffff00; box-shadow: 0 0 30px rgba(255, 255, 0, 0.8); }
            40% { border-color: #00ff00; box-shadow: 0 0 30px rgba(0, 255, 0, 0.8); }
            60% { border-color: #00ffff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }
            80% { border-color: #ff00ff; box-shadow: 0 0 30px rgba(255, 0, 255, 0.8); }
            100% { border-color: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.5) rotate(45deg); }
        }

        .profile-bar.power-up-active {
            animation: rainbow-border 0.5s linear infinite;
            border-width: 3px;
            background: rgba(255, 255, 255, 0.15) !important;
        }

        .power-up-active .nickname {
            background: linear-gradient(to right, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-text 1s linear infinite;
            background-size: 200% auto;
        }

        @keyframes rainbow-text {
            to { background-position: 200% center; }
        }

        .power-up-badge {
            position: absolute;
            left: 50%;
            top: -25px;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 2px 12px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 0 0 20px #fff;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            pointer-events: none;
            z-index: 100;
        }

        .power-up-active .power-up-badge {
            opacity: 1;
            top: -15px;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-5px); }
        }

        /* Records Sections */
        .records-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .record-card {
            background: rgba(30, 30, 30, 0.8);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid var(--glass-border);
        }

        .record-card h3 {
            font-size: 13px;
            color: var(--accent-blue);
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }

        .record-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(4px);
        }

        .pattern-tag {
            width: 32px;
            font-size: 10px;
            font-weight: 900;
            text-align: center;
            border-radius: 3px;
            margin-right: 12px;
            padding: 2px 0;
        }

        .SC { background: #f1c40f; color: #000; }
        .MX { background: #e74c3c; color: #fff; }
        .HD { background: #2ecc71; color: #fff; }
        .NM { background: #3498db; color: #fff; }

        .song-title {
            flex-grow: 1;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .perf-data {
            text-align: right;
            min-width: 80px;
        }

        .val-score {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }

        .val-power {
            font-size: 10px;
            color: var(--accent-blue);
        }

        /* Config / Loading */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 600;
        }

        #error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loading">V-ARCHIVE 데이터를 불러오는 중...</div>
    <div id="error" class="hidden"></div>
    
    <div id="overlay-container" class="hidden">
        <!-- Profile Bar -->
        <div class="profile-bar" id="profile-bar">
            <div class="power-up-badge">POWER UP!</div>
            <div class="nick-group">
                <div class="nickname" id="nick-display">USER</div>
                <div class="button-circle" id="btn-display">6B</div>
            </div>
            <div class="stat-labels">
                <div class="stat-item">CLASS: <span id="class-display">-</span></div>
                <div class="stat-item">POWER: <span id="power-display">0.0000</span></div>
            </div>
            <div class="refresh-timer">
                <div class="timer-progress"><div class="timer-fill" id="timer-bar"></div></div>
                <span id="timer-text">Initializing...</span>
            </div>
        </div>

        <!-- Records Grid -->
        <div class="records-grid">
            <!-- Recent Records -->
            <div class="record-card">
                <h3>Recent Records</h3>
                <div class="record-list" id="recent-list"></div>
            </div>

            <!-- Best Performance -->
            <div class="record-card">
                <h3>Best Performance</h3>
                <div class="record-list" id="best-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://v-archive.net/api/v2';
        
        function parseParams() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 1. Try Hash (for local files or simple hosting: #Nick/8)
            const hashParts = window.location.hash.substring(1).split('/').filter(p => p);
            if (hashParts.length >= 1) {
                return {
                    nickname: decodeURIComponent(hashParts[0]),
                    button: parseInt(hashParts[1]) || 6
                };
            }

            // 2. Try Path (for web servers: /Nick/8)
            // Ignore path parts that look like file names (ending in .html)
            const pathParts = window.location.pathname.split('/').filter(p => p && !p.endsWith('.html') && !p.includes(':'));
            if (pathParts.length >= 1) {
                return {
                    nickname: decodeURIComponent(pathParts[0]),
                    button: parseInt(pathParts[1]) || 6
                };
            }

            // 3. Fallback to Query Params (?nick=Nick&btn=8)
            return {
                nickname: urlParams.get('nick') || urlParams.get('nickname'),
                button: parseInt(urlParams.get('btn') || urlParams.get('button')) || 6
            };
        }

        const { nickname, button } = parseParams();
        const REFRESH_INTERVAL = 60; // seconds

        const overlayContainer = document.getElementById('overlay-container');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const timerFill = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        const profileBar = document.getElementById('profile-bar');

        let countdown = REFRESH_INTERVAL;
        let refreshTimer = null;
        let previousPower = 0;

        async function fetchData(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) throw new Error(`Fetch failed: ${response.status}`);
                return await response.json();
            } catch (err) {
                console.error(err);
                return null;
            }
        }

        function createRecordItem(record) {
            const item = document.createElement('div');
            item.className = 'item';
            
            item.innerHTML = `
                <div class="pattern-tag ${record.pattern}">${record.pattern}</div>
                <div class="song-title">${record.name}</div>
                <div class="perf-data">
                    <div class="val-score">${record.score.toFixed(2)}%</div>
                    <div class="val-power">${record.djpower.toFixed(4)}</div>
                </div>
            `;
            return item;
        }

        async function init(isRefresh = false) {
            if (!nickname) {
                loadingDiv.classList.add('hidden');
                errorDiv.classList.remove('hidden');
                errorDiv.innerHTML = "URL에 닉네임을 입력해주세요.<br>예: index.html?nick=닉네임&btn=6";
                return;
            }

            if (!isRefresh) {
                loadingDiv.classList.remove('hidden');
                overlayContainer.classList.add('hidden');
            }

            const profileData = await fetchData(`/archive/${encodeURIComponent(nickname)}/djClass/${button}`);
            
            if (!profileData || !profileData.success) {
                if (!isRefresh) {
                    loadingDiv.classList.add('hidden');
                    errorDiv.classList.remove('hidden');
                    errorDiv.innerHTML = `유저 '${nickname}'의 데이터를 찾을 수 없습니다.<br>(버튼: ${button}B)`;
                }
                return;
            }

            const currentPower = profileData.djPowerConversion || 0;
            
            // Trigger effect if power increased
            if (isRefresh && currentPower > previousPower && previousPower !== 0) {
                triggerPowerUp();
            }
            previousPower = currentPower;

            document.getElementById('nick-display').innerText = nickname;
            document.getElementById('btn-display').innerText = button + 'B';
            document.getElementById('class-display').innerText = profileData.djClass || 'UNKNOWN';
            document.getElementById('power-display').innerText = currentPower.toFixed(4);

            // Fetch records
            // Note: 'updatedAt' is not supported as a sort parameter in the API V2, 
            // so we fetch all and sort locally for 'Recent Records'.
            const allRecordsData = await fetchData(`/archive/${encodeURIComponent(nickname)}/button/${button}`);
            
            const recentList = document.getElementById('recent-list');
            const bestList = document.getElementById('best-list');
            recentList.innerHTML = '';
            bestList.innerHTML = '';

            if (allRecordsData && allRecordsData.records && allRecordsData.records.length > 0) {
                const records = allRecordsData.records;

                // 1. Recent Records: Sort by updatedAt DESC, take 5
                const recentRecords = [...records]
                    .filter(r => r.updatedAt)
                    .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
                    .slice(0, 5);
                
                if (recentRecords.length > 0) {
                    recentRecords.forEach(r => recentList.appendChild(createRecordItem(r)));
                } else {
                    recentList.innerHTML = "<div style='color:#666; font-size:12px; padding:10px;'>최근 기록이 없습니다.</div>";
                }

                // 2. Best Performance: Sort by djpower DESC, take 5
                const bestRecords = [...records]
                    .sort((a, b) => b.djpower - a.djpower)
                    .slice(0, 5);
                
                if (bestRecords.length > 0) {
                    bestRecords.forEach(r => bestList.appendChild(createRecordItem(r)));
                } else {
                    bestList.innerHTML = "<div style='color:#666; font-size:12px; padding:10px;'>기록이 없습니다.</div>";
                }
            } else {
                recentList.innerHTML = "<div style='color:#666; font-size:12px; padding:10px;'>기록이 없습니다.</div>";
                bestList.innerHTML = "<div style='color:#666; font-size:12px; padding:10px;'>기록이 없습니다.</div>";
            }

            loadingDiv.classList.add('hidden');
            overlayContainer.classList.remove('hidden');
            
            resetTimer();
        }

        function triggerPowerUp() {
            profileBar.classList.add('power-up-active');
            setTimeout(() => {
                profileBar.classList.remove('power-up-active');
            }, 6000); // Effect for 6 seconds
        }

        function resetTimer() {
            countdown = REFRESH_INTERVAL;
            if (refreshTimer) clearInterval(refreshTimer);
            
            updateTimerUI();
            refreshTimer = setInterval(() => {
                countdown--;
                updateTimerUI();
                if (countdown <= 0) {
                    clearInterval(refreshTimer);
                    timerText.innerText = "Updating...";
                    init(true);
                }
            }, 1000);
        }

        function updateTimerUI() {
            const progress = ((REFRESH_INTERVAL - countdown) / REFRESH_INTERVAL) * 100;
            timerFill.style.width = `${progress}%`;
            timerText.innerText = `${countdown}s`;
        }

        init();
    </script>
</body>
</html>
