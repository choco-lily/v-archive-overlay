<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Overlay</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #0c0d0e;
            --card: #16171a;
            --accent: #3b82f6;
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.06);
            --sc: #facc15;
            --mx: #f87171;
            --hd: #4ade80;
            --nm: #60a5fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: "Pretendard Variable", "Pretendard", sans-serif;
            color: var(--text);
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #overlay {
            width: 800px; /* Default for Detail */
            background: rgba(12, 13, 14, 0.85); /* Translucent for OBS */
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden; /* Fixes timer bar overflow */
            animation: emerge 1s cubic-bezier(0.16, 1, 0.3, 1);
            transition: width 0.5s cubic-bezier(0.23, 1, 0.32, 1), padding 0.5s ease;
        }

        @keyframes emerge {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .timer-line {
            position: absolute;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--accent);
            width: 0%;
            transition: width 1s linear;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 48px;
        }

        .user-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .button-type {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
            padding: 6px 14px;
            border-radius: 8px;
            width: fit-content;
        }

        .nickname {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .stats {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stats-label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .power-val {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            line-height: 1;
        }

        .class-val {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 0.02em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        h2 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h2::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            display: flex;
            align-items: center;
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .item:hover {
            border-color: var(--border);
            transform: translateX(4px);
            background: #1c1d21;
        }

        .pt-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 16px;
            flex-shrink: 0;
            box-shadow: 0 0 10px currentColor;
        }

        .pt-SC { color: var(--sc); background: var(--sc); }
        .pt-MX { color: var(--mx); background: var(--mx); }
        .pt-HD { color: var(--hd); background: var(--hd); }
        .pt-NM { color: var(--nm); background: var(--nm); }

        .song {
            flex: 1;
            min-width: 0;
        }

        .name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        .data {
            text-align: right;
            padding-left: 12px;
        }

        .score {
            font-size: 15px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .pow {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Power Up Effect (Sophisticated) */
        .power-up-active {
            border-color: var(--accent) !important;
        }

        @keyframes pulse-accent {
            0% { box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7); }
            50% { box-shadow: 0 40px 120px rgba(59, 130, 246, 0.2); }
            100% { box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7); }
        }

        #overlay.notifying {
            animation: pulse-accent 2s infinite;
        }

        .power-notif {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.1em;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .notifying .power-notif {
            opacity: 1;
            top: -20px;
        }

        .hidden { display: none !important; }
        #loading { color: var(--text-muted); letter-spacing: 1px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="loading">Updating record...</div>
    <div id="error" class="hidden" style="color:#ef4444; padding:40px; text-align:center"></div>
    
    <div id="overlay" class="hidden">
        <div class="timer-line" id="t-line"></div>
        <div class="power-notif">PERFORMANCE INCREASED</div>
        
        <header>
            <div class="user-meta">
                <div class="button-type" id="btn-txt">6 BUTTON</div>
                <div class="nickname" id="nick-txt">USER</div>
            </div>
            <div class="stats">
                <div class="stats-label">DJ POWER</div>
                <div class="power-val" id="pow-txt">0.0000</div>
                <div class="class-val" id="cls-txt">CLASS</div>
            </div>
        </header>

        <section class="main-grid">
            <article>
                <h2>Recent Activity</h2>
                <div class="list" id="recent-list"></div>
            </article>
            <article>
                <h2>Best Performance</h2>
                <div class="list" id="best-list"></div>
            </article>
        </section>
    </div>

    <script>
        const API = 'https://v-archive.net/api/v2';
        
        function getParams() {
            const up = new URLSearchParams(location.search);
            const hash = location.hash.substring(1).split('/').filter(Boolean);
            const path = location.pathname.split('/').filter(x => x && !x.endsWith('.html') && !x.includes(':'));
            
            let n, b, detail = false;

            if (hash.length) {
                n = decodeURIComponent(hash[0]);
                b = parseInt(hash[1]) || 6;
                detail = hash.includes('detail');
            } else if (path.length) {
                n = decodeURIComponent(path[0]);
                b = parseInt(path[1]) || 6;
                detail = path.includes('detail');
            } else {
                n = up.get('nick') || up.get('nickname');
                b = parseInt(up.get('btn') || up.get('button')) || 6;
                detail = up.has('detail');
            }
            return { n, b, showDetail: detail };
        }

        const { n: nickname, b: button, showDetail } = getParams();
        const INTERVAL = 60;
        const el = {
            overlay: document.getElementById('overlay'),
            loading: document.getElementById('loading'),
            error: document.getElementById('error'),
            line: document.getElementById('t-line'),
            nick: document.getElementById('nick-txt'),
            btn: document.getElementById('btn-txt'),
            pow: document.getElementById('pow-txt'),
            cls: document.getElementById('cls-txt'),
            recent: document.getElementById('recent-list'),
            best: document.getElementById('best-list')
        };

        let lastPower = 0;
        let timer = null;
        let left = INTERVAL;

        async function fetchAPI(p) {
            try {
                const r = await fetch(API + p);
                return r.ok ? await r.json() : null;
            } catch { return null; }
        }

        function createItem(r) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="pt-indicator pt-${r.pattern}"></div>
                <div class="song">
                    <div class="name">${r.name}</div>
                    <div class="meta">${r.pattern} Lv.${r.level} • ${r.dlcCode}</div>
                </div>
                <div class="data">
                    <div class="score">${r.score.toFixed(2)}%</div>
                    <div class="pow">${r.djpower.toFixed(4)}</div>
                </div>
            `;
            return div;
        }

        async function sync(isRefresh = false) {
            if (!nickname) {
                el.loading.classList.add('hidden');
                el.error.classList.remove('hidden');
                el.error.innerHTML = "Nickname parameter missing.<br>Use #Nickname/Button format.";
                return;
            }

            const profile = await fetchAPI(`/archive/${encodeURIComponent(nickname)}/djClass/${button}`);
            if (!profile || !profile.success) {
                if (!isRefresh) {
                    el.loading.classList.add('hidden');
                    el.error.classList.remove('hidden');
                    el.error.innerHTML = `Archive not found for '${nickname}' / ${button}B.`;
                }
                return;
            }

            const power = profile.djPowerConversion || 0;
            if (isRefresh && power > lastPower && lastPower !== 0) {
                el.overlay.classList.add('notifying');
                setTimeout(() => el.overlay.classList.remove('notifying'), 10000);
            }
            lastPower = power;

            el.nick.innerText = nickname;
            el.btn.innerText = `${button} BUTTON`;
            el.cls.innerText = profile.djClass || 'NO CLASS';
            el.pow.innerText = power.toFixed(4);

            const headEl = document.querySelector('header');
            
            if (!showDetail) {
                document.querySelector('.main-grid').classList.add('hidden');
                el.overlay.style.width = '620px'; // Wider for larger text
                el.overlay.style.padding = '35px 40px';
                headEl.style.marginBottom = '0';
                headEl.style.paddingBottom = '0';
                headEl.style.borderBottom = 'none';
            } else {
                el.overlay.style.width = '900px'; 
                const all = await fetchAPI(`/archive/${encodeURIComponent(nickname)}/button/${button}`);
                el.recent.innerHTML = '';
                el.best.innerHTML = '';

                if (all && all.records) {
                    const recs = all.records;
                    const recentRecs = [...recs].filter(x => x.updatedAt).sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt)).slice(0, 5);
                    const bestRecs = [...recs].sort((a,b) => b.djpower - a.djpower).slice(0, 5);
                    
                    recentRecs.forEach(r => el.recent.appendChild(createItem(r)));
                    bestRecs.forEach(r => el.best.appendChild(createItem(r)));
                } else {
                    const empty = "<div style='color:var(--text-muted); font-size:12px; padding:20px; text-align:center'>No record available</div>";
                    el.recent.innerHTML = empty; el.best.innerHTML = empty;
                }
            }

            el.loading.classList.add('hidden');
            el.overlay.classList.remove('hidden');
            startCountdown();
        }

        function startCountdown() {
            left = INTERVAL;
            if (timer) clearInterval(timer);
            updateTimerUI();
            timer = setInterval(() => {
                left--;
                updateTimerUI();
                if (left <= 0) {
                    clearInterval(timer);
                    sync(true);
                }
            }, 1000);
        }

        function updateTimerUI() {
            el.line.style.width = ((INTERVAL - left) / INTERVAL * 100) + '%';
        }

        sync();
    </script>
</body>
</html>
