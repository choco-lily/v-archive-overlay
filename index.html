<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite DJMAX Overlay</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-main: rgba(10, 11, 14, 0.95);
            --card-bg: rgba(255, 255, 255, 0.04);
            --accent-primary: #00f2ff;
            --accent-secondary: #bc00ff;
            --accent-gold: #ffcc00;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: "Pretendard Variable", "Pretendard", sans-serif;
            color: var(--text-main);
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #overlay-container {
            width: 850px;
            background: var(--bg-main);
            border-radius: 28px;
            padding: 35px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(25px);
            position: relative;
            animation: slide-up 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animated Progress Bar */
        .progress-line {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            width: 0%;
            transition: width 1s linear;
            box-shadow: 0 0 15px var(--accent-primary);
        }

        /* Profile Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .btn-badge {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.4);
        }

        .nickname {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-block {
            text-align: right;
        }

        .stats-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .power-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-primary);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .class-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-top: 4px;
        }

        /* Main Content Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        .grid-header {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .grid-header::after {
            content: '';
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.1), transparent);
        }

        .record-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Record Item Styling */
        .record-item {
            background: var(--card-bg);
            padding: 14px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .record-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02) translateX(10px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .pattern-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .SC {
            background: rgba(255, 204, 0, 0.15);
            color: #ffcc00;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        .MX {
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .HD {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .NM {
            background: rgba(0, 153, 255, 0.15);
            color: #0099ff;
            border: 1px solid rgba(0, 153, 255, 0.3);
        }

        .song-info {
            flex-grow: 1;
            min-width: 0;
        }

        .song-name {
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .song-sub {
            font-size: 12px;
            color: var(--text-dim);
        }

        .record-data {
            text-align: right;
            flex-shrink: 0;
        }

        .score-txt {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
        }

        .power-txt {
            font-size: 11px;
            color: var(--accent-primary);
            font-family: monospace;
            opacity: 0.8;
        }

        /* Power Up Effect */
        .power-up-mode {
            border-color: var(--accent-primary) !important;
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.2);
        }

        .power-up-mode::after {
            content: 'POWER UP!';
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 12px;
            font-weight: 900;
            color: var(--accent-primary);
            letter-spacing: 2px;
            animation: blink 0.6s infinite alternate;
        }

        @keyframes blink {
            from {
                opacity: 0.2;
                transform: translateY(0);
            }

            to {
                opacity: 1;
                transform: translateY(-3px);
            }
        }

        .hidden {
            display: none !important;
        }

        #loader {
            text-align: center;
            margin-top: 45vh;
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--text-dim);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        #error-ui {
            padding: 60px;
            text-align: center;
            color: #ff4d4d;
        }
    </style>
</head>

<body>
    <div id="loader">INITIALIZING SENSORS...</div>
    <div id="error-ui" class="hidden"></div>

    <div id="overlay-container" class="hidden">
        <div class="progress-line" id="timer-bar"></div>

        <header>
            <div class="user-info">
                <div class="btn-badge" id="btn-display">0B</div>
                <div class="nickname" id="nick-display">GUEST</div>
            </div>
            <div class="stats-block">
                <div class="stats-title">Performance Rating</div>
                <div class="power-value" id="power-display">0.0000</div>
                <div class="class-name" id="class-display">DJ CLASS</div>
            </div>
        </header>

        <main class="grid">
            <section>
                <div class="grid-header">LATEST TRANSMISSIONS</div>
                <div class="record-list" id="recent-list"></div>
            </section>
            <section>
                <div class="grid-header">TOP ACHIEVEMENTS</div>
                <div class="record-list" id="best-list"></div>
            </section>
        </main>
    </div>

    <script>
        const DJ_API = 'https://v-archive.net/api/v2';

        function getParams() {
            const url = new URLSearchParams(window.location.search);
            const hash = window.location.hash.substring(1).split('/').filter(x => x);
            if (hash.length > 0) return { nick: decodeURIComponent(hash[0]), btn: parseInt(hash[1]) || 6 };
            const path = window.location.pathname.split('/').filter(x => x && !x.endsWith('.html') && !x.includes(':'));
            if (path.length > 0) return { nick: decodeURIComponent(path[0]), btn: parseInt(path[1]) || 6 };
            return { nick: url.get('nick') || url.get('nickname'), btn: parseInt(url.get('btn') || url.get('button')) || 6 };
        }

        const { nick, btn } = getParams();
        const REFRESH_RATE = 60;
        const mainUI = document.getElementById('overlay-container');
        const loader = document.getElementById('loader');
        const errorUI = document.getElementById('error-ui');
        const timerLine = document.getElementById('timer-bar');

        let leftCount = REFRESH_RATE;
        let ticker = null;
        let lastPowerValue = 0;

        async function apiFetch(path) {
            try {
                const res = await fetch(`${DJ_API}${path}`);
                if (!res.ok) return null;
                return await res.json();
            } catch { return null; }
        }

        function buildItem(rec) {
            const el = document.createElement('div');
            el.className = 'record-item';
            el.innerHTML = `
                <div class="pattern-box ${rec.pattern}">${rec.pattern}</div>
                <div class="song-info">
                    <div class="song-name">${rec.name}</div>
                    <div class="song-sub">Lv.${rec.level} / ${rec.dlcCode}</div>
                </div>
                <div class="record-data">
                    <div class="score-txt">${rec.score.toFixed(2)}%</div>
                    <div class="power-txt">${rec.djpower.toFixed(4)} P</div>
                </div>
            `;
            return el;
        }

        async function startApp(isReload = false) {
            if (!nick) {
                loader.classList.add('hidden');
                errorUI.classList.remove('hidden');
                errorUI.innerHTML = "SPECIFY NICKNAME IN URL<br>#Nickname/Button";
                return;
            }

            if (!isReload) {
                loader.classList.remove('hidden');
                mainUI.classList.add('hidden');
            }

            const profile = await apiFetch(`/archive/${encodeURIComponent(nick)}/djClass/${btn}`);
            if (!profile || !profile.success) {
                if (!isReload) {
                    loader.classList.add('hidden');
                    errorUI.classList.remove('hidden');
                    errorUI.innerHTML = `USER '${nick}' DATA NOT ACCESSIBLE.`;
                }
                return;
            }

            const currentPower = profile.djPowerConversion || 0;
            if (isReload && currentPower > lastPowerValue && lastPowerValue !== 0) {
                mainUI.classList.add('power-up-mode');
                setTimeout(() => mainUI.classList.remove('power-up-mode'), 7000);
            }
            lastPowerValue = currentPower;

            document.getElementById('nick-display').innerText = nick;
            document.getElementById('btn-display').innerText = btn + 'B';
            document.getElementById('class-display').innerText = profile.djClass || 'UNKNOWN';
            document.getElementById('power-display').innerText = currentPower.toFixed(4);

            const allData = await apiFetch(`/archive/${encodeURIComponent(nick)}/btn/${btn}`); // wait, typo in path in previous versions sometimes? it's /button/{button}
            // Correcting based on API doc: /api/v2/archive/{nickname}/button/{button}
            const correctData = await apiFetch(`/archive/${encodeURIComponent(nick)}/button/${btn}`);

            const rList = document.getElementById('recent-list');
            const bList = document.getElementById('best-list');
            rList.innerHTML = '';
            bList.innerHTML = '';

            if (correctData && correctData.records) {
                const recs = correctData.records;
                const recent = [...recs].filter(x => x.updatedAt).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)).slice(0, 5);
                const best = [...recs].sort((a, b) => b.djpower - a.djpower).slice(0, 5);

                recent.forEach(r => rList.appendChild(buildItem(r)));
                best.forEach(r => bList.appendChild(buildItem(r)));
            } else {
                rList.innerHTML = "<div style='color:rgba(255,255,255,0.15); font-size:12px; padding:20px;'>NO DATA</div>";
                bList.innerHTML = rList.innerHTML;
            }

            loader.classList.add('hidden');
            mainUI.classList.remove('hidden');
            startTimer();
        }

        function startTimer() {
            leftCount = REFRESH_RATE;
            if (ticker) clearInterval(ticker);
            updateTimerUI();
            ticker = setInterval(() => {
                leftCount--;
                updateTimerUI();
                if (leftCount <= 0) {
                    clearInterval(ticker);
                    startApp(true);
                }
            }, 1000);
        }

        function updateTimerUI() {
            timerLine.style.width = ((REFRESH_RATE - leftCount) / REFRESH_RATE * 100) + '%';
        }

        startApp();
    </script>
</body>

</html>
